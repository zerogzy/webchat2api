name: webchat2api

services:
  webchat2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: webchat2api:latest
    container_name: webchat2api
    restart: unless-stopped
    ports:
      - "83:83"
    volumes:
      - ./data:/app/data
      # Optional local override: cp config.example.json config.json, then uncomment.
      # Do not bind config.json read-only if you need Web UI settings saves.
      # - ./config.json:/app/config.json
    environment:
      LOGIN_SECRET: admin
      STORAGE_BACKEND: sqlite
      DATABASE_URL: sqlite:////app/data/accounts.db
    # 仅当 bridge 网络中的容器需要访问宿主机代理时取消注释。
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
