name: webchat2api

services:
  webchat2api:
    image: webchat2api:latest
    container_name: webchat2api
    restart: unless-stopped
    ports:
      - "83:83"
    volumes:
      - ./data:/app/data
      # Optional local override: cp config.example.json config.json, then uncomment.
      # Do not bind config.json read-only if you need Web UI settings saves.
      # - ./config.json:/app/config.json
    environment:
      LOGIN_SECRET: admin
      STORAGE_BACKEND: json
      # 如需访问宿主机代理，可同时取消下一行和 extra_hosts 的注释。
      # PROXY_URL: http://host.docker.internal:7890
      # WEBCHAT2API_BASE_URL: https://your-domain.com
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
