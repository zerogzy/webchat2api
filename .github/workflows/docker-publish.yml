name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Comma-separated Docker platforms to build"
        required: false
        default: "linux/amd64"

env:
  IMAGE_NAME: webchat2api
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME || github.repository_owner }}
  HAS_DOCKERHUB_CREDENTIALS: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker build settings
        id: build_settings
        shell: bash
        env:
          REQUESTED_PLATFORMS: ${{ github.event.inputs.platforms || '' }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${REQUESTED_PLATFORMS}" ]]; then
            platforms="${REQUESTED_PLATFORMS}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            platforms="linux/amd64,linux/arm64"
          else
            platforms="linux/amd64"
          fi

          platforms="${platforms//[[:space:]]/}"
          if [[ -z "${platforms}" ]]; then
            platforms="linux/amd64"
          fi

          IFS=',' read -ra requested_platforms <<< "${platforms}"
          for platform in "${requested_platforms[@]}"; do
            if [[ "${platform}" != "linux/amd64" && "${platform}" != "linux/arm64" ]]; then
              echo "Unsupported Docker platform: ${platform}. Supported platforms: linux/amd64,linux/arm64" >&2
              exit 1
            fi
          done

          if [[ "${platforms}" == *,* ]]; then
            cache_mode="max"
          else
            cache_mode="min"
          fi

          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"
          echo "cache_mode=${cache_mode}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: ${{ contains(steps.build_settings.outputs.platforms, 'arm') }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        if: ${{ env.HAS_DOCKERHUB_CREDENTIALS == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            name=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }},enable=${{ env.HAS_DOCKERHUB_CREDENTIALS == 'true' }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: app
          platforms: ${{ steps.build_settings.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=${{ steps.build_settings.outputs.cache_mode }}
