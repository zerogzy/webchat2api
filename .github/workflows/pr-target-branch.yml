name: PR Target Branch

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: pr-target-branch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Enforce pull request target branch
        uses: actions/github-script@v7
        with:
          script: |
            const baseBranch = context.payload.pull_request.base.ref;
            const pullNumber = context.payload.pull_request.number;
            const marker = '<!-- pr-target-branch-enforcement -->';
            const wrongTargetBranchLabel = 'wrong-target-branch';

            const messages = {
              main: [
                marker,
                'This project does not accept direct pull requests to `main`.',
                '',
                '`main` is the stable release branch, and `dev` is the development branch.',
                'Please change this pull request base branch to `dev`.',
              ].join('\n'),
              other: [
                marker,
                'Pull requests for this project must target `dev`.',
                '',
                'Please change this pull request base branch to `dev`.',
              ].join('\n'),
            };

            const postCommentOnce = async (body) => {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullNumber,
                per_page: 100,
              });

              const alreadyPosted = comments
                .slice(-100)
                .some((comment) => {
                  const author = comment.user?.login || '';
                  return author === 'github-actions[bot]' && String(comment.body || '').includes(marker);
                });

              if (!alreadyPosted) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pullNumber,
                  body,
                });
              }
            };

            const ensureWrongTargetBranchLabel = async () => {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: wrongTargetBranchLabel,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: wrongTargetBranchLabel,
                  color: 'd73a4a',
                  description: 'Pull request targets a branch other than dev',
                });
              }
            };

            const addWrongTargetBranchLabel = async () => {
              await ensureWrongTargetBranchLabel();
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullNumber,
                labels: [wrongTargetBranchLabel],
              });
            };

            const removeWrongTargetBranchLabel = async () => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pullNumber,
                  name: wrongTargetBranchLabel,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            };

            if (baseBranch === 'dev') {
              await removeWrongTargetBranchLabel();
              return;
            }

            await addWrongTargetBranchLabel();

            if (baseBranch === 'main') {
              await postCommentOnce(messages.main);
              core.setFailed('Pull requests must target dev, not main.');
              return;
            }

            await postCommentOnce(messages.other);
            core.setFailed('Pull requests must target dev.');
