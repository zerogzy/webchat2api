name: AI PR Review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string
      instruction:
        description: Review instruction for the AI reviewer
        required: false
        default: Review this PR
        type: string

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.3-codex
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL || 'https://api.openai.com' }}
      PR_NUMBER: ${{ github.event.inputs.pr_number }}
      REVIEW_INSTRUCTION: ${{ github.event.inputs.instruction }}

    steps:
      - name: Review pull request
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventPrNumber = context.payload.pull_request?.number;
            const prInput = String(process.env.PR_NUMBER || eventPrNumber || '').trim();
            const instruction = String(process.env.REVIEW_INSTRUCTION || 'Review this PR').trim() || 'Review this PR';
            const rejectRequested = instruction.toLowerCase().includes('reject this pr');

            if (!/^[1-9]\d*$/.test(prInput)) {
              core.setFailed('pr_number must be a positive integer.');
              return;
            }

            const pull_number = Number(prInput);
            const maxStringLength = 6000;
            const maxBodyLength = 14000;
            const maxFiles = 80;
            const maxPatchCharsPerFile = 12000;
            const maxPatchCharsTotal = 60000;
            const maxComments = 30;
            const maxFindings = 25;
            const decisionValues = new Set(['approve', 'comment', 'request_changes']);
            const severityValues = new Set(['critical', 'major', 'minor', 'info']);

            const clampText = (value, limit = maxStringLength) => {
              const text = String(value ?? '');
              if (text.length <= limit) {
                return text;
              }
              return `${text.slice(0, Math.max(0, limit - 40))}\n[truncated ${text.length - limit + 40} characters]`;
            };

            const stripFence = (value) => {
              let text = String(value ?? '').trim();
              const fenceMatch = text.match(/^```(?:json)?\s*([\s\S]*?)\s*```$/i);
              if (fenceMatch) {
                text = fenceMatch[1].trim();
              }
              return text;
            };

            const safeJsonParse = (value) => {
              const text = stripFence(value);
              try {
                return JSON.parse(text);
              } catch (error) {
                const start = text.indexOf('{');
                const end = text.lastIndexOf('}');
                if (start !== -1 && end > start) {
                  return JSON.parse(text.slice(start, end + 1));
                }
                throw error;
              }
            };

            const validateFinding = (finding) => {
              if (!finding || typeof finding !== 'object' || Array.isArray(finding)) {
                throw new Error('Each AI finding must be an object.');
              }
              if (!severityValues.has(finding.severity)) {
                throw new Error('AI finding severity must be one of: critical, major, minor, info.');
              }
              if (typeof finding.file !== 'string') {
                throw new Error('AI finding file must be a string.');
              }
              if (finding.line !== null && (!Number.isInteger(finding.line) || finding.line <= 0)) {
                throw new Error('AI finding line must be a positive integer or null.');
              }
              if (typeof finding.message !== 'string' || finding.message.trim().length === 0) {
                throw new Error('AI finding message must be a non-empty string.');
              }

              return {
                severity: finding.severity,
                file: clampText(finding.file, 500),
                line: finding.line,
                message: clampText(finding.message, 1600),
              };
            };

            const validateReview = (data) => {
              if (!data || typeof data !== 'object' || Array.isArray(data)) {
                throw new Error('AI response was not a JSON object.');
              }
              if (!decisionValues.has(data.decision)) {
                throw new Error('AI response decision must be approve, comment, or request_changes.');
              }
              if (typeof data.summary !== 'string' || data.summary.trim().length === 0) {
                throw new Error('AI response summary must be a non-empty string.');
              }
              if (!Array.isArray(data.findings)) {
                throw new Error('AI response findings must be an array.');
              }
              if (typeof data.comment_summary !== 'string' || data.comment_summary.trim().length === 0) {
                throw new Error('AI response comment_summary must be a non-empty string.');
              }
              if (typeof data.confidence !== 'number' || !Number.isFinite(data.confidence) || data.confidence < 0 || data.confidence > 1) {
                throw new Error('AI response confidence must be a number from 0 to 1.');
              }

              return {
                decision: data.decision,
                summary: clampText(data.summary, 5000),
                findings: data.findings.map(validateFinding).slice(0, maxFindings),
                comment_summary: clampText(data.comment_summary, 5000),
                confidence: data.confidence,
              };
            };

            const formatReviewBody = (review) => {
              const findingsText = review.findings.length
                ? review.findings.map((finding, index) => {
                    const location = finding.file
                      ? `${finding.file}${finding.line ? `:${finding.line}` : ''}`
                      : 'General';
                    return `${index + 1}. [${finding.severity}] ${location} - ${finding.message}`;
                  }).join('\n')
                : 'No specific findings were returned.';

              const rejectNotice = rejectRequested
                ? '\n\nInstruction note: The manual instruction requested a strict negative review (`Reject this PR`), so this review is posted as `REQUEST_CHANGES` without closing, merging, labeling, assigning, or approving the PR.'
                : '';

              return clampText([
                '## AI PR Review',
                '',
                `Decision: ${review.decision}`,
                `Confidence: ${review.confidence.toFixed(2)}`,
                '',
                '### Summary',
                review.summary,
                '',
                '### Findings',
                findingsText,
                '',
                '### Recent Comment Summary',
                review.comment_summary,
                rejectNotice,
              ].join('\n'), maxBodyLength);
            };

            const postFailureComment = async (message) => {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: clampText([
                  '## AI PR Review Failed',
                  '',
                  'The AI PR review could not be completed, so no review state was submitted.',
                  '',
                  `Reason: ${message}`,
                ].join('\n'), maxBodyLength),
              });
            };

            const postDevBaseRequiredComment = async (baseRef) => {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: clampText([
                  '## AI PR Review Refused',
                  '',
                  `This PR targets \`${baseRef || 'unknown'}\`, but AI PR Review only runs for PRs targeting \`dev\`.`,
                  '`main` is the stable release branch, and direct PRs to `main` are not accepted.',
                  'Please change the PR base branch to `dev`, then run AI PR Review again.',
                ].join('\n'), maxBodyLength),
              });
            };

            const postDraftSkippedComment = async () => {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: clampText([
                  '## AI PR Review Skipped',
                  '',
                  'This PR is currently marked as a draft. AI PR Review will run after the PR is marked ready for review, or it can be run manually after that.',
                ].join('\n'), maxBodyLength),
              });
            };

            try {
              const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number });
              const baseRef = pull.base?.ref || '';
              if (baseRef !== 'dev') {
                const message = `AI PR Review only reviews PRs targeting dev; this PR targets ${baseRef || 'unknown'}.`;
                await postDevBaseRequiredComment(baseRef);
                core.setFailed(message);
                return;
              }

              if (pull.draft) {
                core.info('Skipping AI PR Review because the pull request is a draft.');
                await postDraftSkippedComment();
                return;
              }

              if (!process.env.OPENAI_API_KEY) {
                throw new Error('OPENAI_API_KEY secret is not configured.');
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number,
                per_page: 100,
              });
              const issueComments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pull_number,
                per_page: 100,
              });
              const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner,
                repo,
                pull_number,
                per_page: 100,
              });

              let usedPatchChars = 0;
              const changedFiles = files.slice(0, maxFiles).map((file) => {
                const rawPatch = String(file.patch || '');
                const remainingPatchChars = Math.max(0, maxPatchCharsTotal - usedPatchChars);
                const patchLimit = Math.min(maxPatchCharsPerFile, remainingPatchChars);
                const patch = patchLimit > 0 ? clampText(rawPatch, patchLimit) : '[patch omitted: total prompt patch limit reached]';
                usedPatchChars += Math.min(rawPatch.length, patchLimit);
                return {
                  filename: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions,
                  changes: file.changes,
                  patch,
                };
              });

              const recentIssueComments = issueComments.slice(-maxComments).map((comment) => ({
                author: comment.user?.login || 'unknown',
                created_at: comment.created_at,
                body: clampText(comment.body, 1500),
              }));
              const recentReviewComments = reviewComments.slice(-maxComments).map((comment) => ({
                author: comment.user?.login || 'unknown',
                created_at: comment.created_at,
                file: comment.path,
                line: comment.line || comment.original_line || null,
                body: clampText(comment.body, 1500),
              }));

              const promptPayload = {
                instruction,
                reject_instruction_detected: rejectRequested,
                repository: `${owner}/${repo}`,
                pull_request: {
                  number: pull.number,
                  title: pull.title,
                  body: clampText(pull.body, 5000),
                  state: pull.state,
                  draft: pull.draft,
                  user: pull.user?.login || 'unknown',
                  base: {
                    ref: pull.base?.ref,
                    sha: pull.base?.sha,
                  },
                  head: {
                    ref: pull.head?.ref,
                    sha: pull.head?.sha,
                    repo_full_name: pull.head?.repo?.full_name || null,
                  },
                  additions: pull.additions,
                  deletions: pull.deletions,
                  changed_files: pull.changed_files,
                },
                changed_files: changedFiles,
                omitted_files_count: Math.max(0, files.length - changedFiles.length),
                recent_issue_comments: recentIssueComments,
                recent_review_comments: recentReviewComments,
              };

              const systemPrompt = [
                'You are a strict pull request reviewer. Review only the supplied metadata, changed-file list, patches, and comments fetched through the GitHub API.',
                'The workflow must never rely on checked-out pull request code or executed pull request code.',
                'The development branch and source of truth is dev. The main branch is the stable release branch, and PRs should target dev instead of main.',
                'Do not assume code was checked out or executed. Do not request repository mutation beyond review feedback.',
                'If the user instruction includes "Reject this PR", perform a negative and strict review, but do not suggest closing or merging the PR.',
                'Return JSON only with this exact schema: {"decision":"approve"|"comment"|"request_changes","summary":"string","findings":[{"severity":"critical"|"major"|"minor"|"info","file":"string","line":number|null,"message":"string"}],"comment_summary":"string","confidence":number}.',
                'Use decision "request_changes" only when there are concrete blocking issues. The workflow will never submit APPROVE automatically.',
              ].join('\n');

              const openaiBaseUrl = String(process.env.OPENAI_BASE_URL || 'https://api.openai.com').replace(/\/+$/, '');
              const response = await fetch(`${openaiBaseUrl}/v1/chat/completions`, {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: process.env.OPENAI_MODEL,
                  messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: JSON.stringify(promptPayload) },
                  ],
                  temperature: 0.2,
                }),
              });

              if (!response.ok) {
                throw new Error(`OpenAI API returned HTTP ${response.status}.`);
              }

              const apiData = await response.json();
              const content = apiData?.choices?.[0]?.message?.content;
              if (!content) {
                throw new Error('OpenAI API response did not include message content.');
              }

              const review = validateReview(safeJsonParse(content));
              const event = rejectRequested || review.decision === 'request_changes' ? 'REQUEST_CHANGES' : 'COMMENT';
              const body = formatReviewBody(review);

              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number,
                event,
                body,
              });
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.warning(`AI PR review failed: ${message}`);
              try {
                await postFailureComment(message);
              } catch (commentError) {
                const commentMessage = commentError instanceof Error ? commentError.message : String(commentError);
                core.setFailed(`AI PR review failed and failure comment could not be posted: ${commentMessage}`);
                return;
              }
              core.setFailed(`AI PR review failed: ${message}`);
            }
